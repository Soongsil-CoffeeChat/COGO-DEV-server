# === 공통 설정 ===
spring:
  config:
    activate:
      on-profile: prod
    import: aws-parameterstore:/config/cogo-server/

  profiles:
    active: local
  jackson:
    time-zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database: mysql
    properties:
      hibernate:
        default_batch_fetch_size: 100

  datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 3000 # 커넥션 대기 최대 3초
        idle-timeout: 600000 # 유휴 커넥션 10분 후 반환

  jwt:
    access-expiration: 2592000000 # 임시_30일
    refresh-expiration: 2592000000 # 임시_30일
    secret: ${JWT_SECRET}

  security:
    oauth2:
      client:
        registration:
          google:
            client-name: google
            client-id: ${GOOGLE_ID}
            client-secret: ${GOOGLE_SECRET}
            authorization-grant-type: authorization_code
            scope: profile,email
  apple:
    team-id: ${APPLE_TEAM_ID}
    key-id: ${APPLE_KEY_ID}
    web-service-id: ${APPLE_SERVICE_ID}
    private-key: ${APPLE_P8}
    token-url: https://appleid.apple.com/auth/token

# 세션 하이재킹 방지
server:
  servlet:
    session:
      tracking-modes: cookie
# Admin
admin:
  password: ${ADMIN_PASSWORD}

cloud:
  aws:
    s3:
      bucket: ${BUCKET_NAME}
    credentials:
      access-key: ${S3_ACCESS}
      secret-key: ${S3_SECRET}
    region:
      static: ap-northeast-2
      auto: false
    stack:
      auto: false

# 전화번호 인증
coolsms:
  from: ${SMS_FROM}
  api-key: ${SMS_KEY}
  api-secret: ${SMS_SECRET}

# google firebase 설정
firebase:
  credential:
    json: ${FIREBASE_CREDENTIALS_JSON}

# 이벤트 매장 핀번호
event:
  store:
    pin: ${EVENT_STORE_PIN:0000}

---
# === local 개발 환경 ===
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
  datasource:
    url: jdbc:mysql://localhost:3306/cogo_db_local?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      ssl:
        enabled: false

  jwt:
    access-expiration: 2592000000 # 30일
    refresh-expiration: 2592000000

swagger:
  server-url: http://localhost:8080
  server-description: Local development server

logging.level:
  com.soongsil.CoffeeChat.domain.auth: debug

---
# === prod 환경 ===
spring:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        show_sql: false

  datasource:
    url: jdbc:mysql://${DB_URL}:3306/${DB_NAME}?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PW}

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      ssl:
        enabled: true

  jwt:
    access-expiration: 1800000 # 30분
    refresh-expiration: 1209600000 # 14일

swagger:
  server-url: https://cogossu.store
  server-description: Production server

logging.level:
  com.soongsil.CoffeeChat.domain.auth: warn
