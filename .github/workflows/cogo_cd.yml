name: Deploy Docker Image

on:
  workflow_run:
    workflows:
      - Build Docker Image
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_IAM_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_IAM_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Send deploy command via AWS CLI
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region ap-northeast-2 \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy latest cogo-server" \
            --parameters 'commands=[
              "set -e",
              "cd /home/ubuntu",
              "echo \"${{ secrets.DOCKERHUB_PASSWORD }}\" | sudo docker login -u \"${{ secrets.DOCKERHUB_USERNAME }}\" --password-stdin",
              "sudo docker pull coffeego/cogo-server:latest",
              "sudo docker rm -f cogo-server || true",
              "sudo docker run -d --name cogo-server -p 8080:8080 -e SPRING_PROFILES_ACTIVE=prod coffeego/cogo-server:latest",
              "sudo docker ps -a"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID"

          sleep 10

          aws ssm get-command-invocation \
            --region ap-northeast-2 \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"