version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cogo-mysql-local
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cogo_db_local
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: cogo-redis-local
    ports:
      - "6379:6379"

volumes:
  mysql-data: